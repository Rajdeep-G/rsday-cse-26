<link href='https://fonts.googleapis.com/css?family=Josefin+Sans' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Playfair+Display' rel='stylesheet' type='text/css'>
<link href="https://fonts.googleapis.com/css?family=Raleway:100,300,400" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

<style type="text/css">
/* ===== Global Reset & Background ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #f5f0ff 0%, #eaf4fb 40%, #fdf6ee 100%);
    font-family: 'Mukta', sans-serif;
}

/* ===== Navigation ===== */
.top-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 18px 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 2px 20px rgba(0, 0, 0, 0.04);
}

.top-nav a {
    margin: 0 25px;
    font-family: 'Mukta', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: #3a3a6e !important;
    text-decoration: none;
    transition: all 0.3s ease;
    position: relative;
    padding-bottom: 4px;
}

.top-nav a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #6c63ff, #e94560);
    transition: width 0.3s ease;
    border-radius: 2px;
}

.top-nav a:hover::after {
    width: 100%;
}

.top-nav a:hover {
    color: #6c63ff !important;
}

.nav-logo {
    height: 40px;
    position: absolute;
    right: 20px;
    padding-bottom: 0;
}

/* ===== Links ===== */
a:link {
    text-decoration: none;
    color: #3a3a6e;
    font-family: 'Mukta', sans-serif;
    font-weight: 400;
    font-size: 22px;
}

a:visited {
    text-decoration: none;
    color: #3a3a6e;
}

a:hover {
    color: #6c63ff;
}

/* ===== Custom Tags ===== */
st {
    font-family: 'Mukta', sans-serif;
    font-weight: 600;
    font-size: 54px;
    letter-spacing: -0.5px;
}

f22 {
    font-family: 'Mukta', sans-serif;
    font-weight: 400;
    font-size: 22px;
}

/* ===== Main Content Area ===== */
.content-wrapper {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 30px 60px;
}

/* ===== Page Title ===== */
.page-title {
    text-align: center;
    margin-bottom: 10px;
    animation: fadeInDown 0.6s ease-out;
}

.page-title p {
    background: linear-gradient(135deg, #3a3a6e, #6c63ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* ===== Video Section ===== */
.video-card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    padding: 30px 36px;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.06),
                0 1px 4px rgba(0, 0, 0, 0.04);
    animation: fadeInUp 0.6s ease-out 0.3s both;
    margin-bottom: 30px;
}

.video-card h3 {
    font-family: 'Mukta', sans-serif;
    font-size: 24px;
    font-weight: 600;
    color: #3a3a6e;
    margin-bottom: 16px;
}

.video-wrapper {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 aspect ratio */
    height: 0;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
}

.video-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 12px;
}

.video-thumbnail-link {
    display: block;
    text-decoration: none;
}

.video-thumbnail {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.video-thumbnail:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.18);
}

.video-thumbnail img {
    width: 100%;
    display: block;
    border-radius: 12px;
}

.play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.85;
    transition: opacity 0.3s ease, transform 0.3s ease;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
}

.video-thumbnail:hover .play-button {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.1);
}

/* ===== Scroll-to-Top Button ===== */
#myBtn {
    position: fixed;
    bottom: 24px;
    right: 30px;
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, #3a3a6e, #6c63ff);
    border-radius: 50%;
    border: none;
    box-shadow: 0 4px 15px rgba(108, 99, 255, 0.35);
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

#myBtn:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(108, 99, 255, 0.5);
}

#myBtn a {
    color: white !important;
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
}

/* ===== Footer Accent ===== */
.footer-accent {
    text-align: center;
    margin-top: 50px;
    padding: 20px 0;
    opacity: 0.4;
    font-size: 28px;
    letter-spacing: 8px;
}

/* ===== Animations ===== */
@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
    .top-nav {
        flex-wrap: wrap;
        gap: 8px;
    }
    .top-nav a {
        margin: 4px 12px;
        font-size: 18px;
    }
    .content-wrapper {
        padding: 20px 12px 40px;
    }
    st {
        font-size: 36px;
    }
    .video-card {
        padding: 18px 16px;
    }
}
</style>
</head>

<body>

        <div class="video-thumbnail">
            <img src="https://img.youtube.com/vi/pw21YQvSxD4/maxresdefault.jpg" alt="Research Scholars' Day Video">
            <div class="play-button">
                <svg viewBox="0 0 68 48" width="68" height="48">
                    <path d="M66.52 7.74c-.78-2.93-2.49-5.41-5.42-6.19C55.79.13 34 0 34 0S12.21.13 6.9 1.55c-2.93.78-4.64 3.26-5.42 6.19C.06 13.05 0 24 0 24s.06 10.95 1.48 16.26c.78 2.93 2.49 5.41 5.42 6.19C12.21 47.87 34 48 34 48s21.79-.13 27.1-1.55c2.93-.78 4.64-3.26 5.42-6.19C67.94 34.95 68 24 68 24s-.06-10.95-1.48-16.26z" fill="#FF0000"/>
                    <path d="M45 24L27 14v20" fill="#fff"/>
                </svg>
            </div>
        </div>
    </a>
    <f22><p style="margin-top: 12px; text-align: center;"><a href="https://www.youtube.com/watch?v=pw21YQvSxD4" target="_blank" style="color: #6c63ff;">Click to watch on YouTube ↗</a></p></f22>
</div>

<div class="footer-accent">✦ ✦ ✦</div>

</div>

<button id="myBtn"><a href="#top" style="color: white; text-decoration: none;">▲</a></button>

</body>

</html>
